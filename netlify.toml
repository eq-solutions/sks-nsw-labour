[functions]
  directory = "netlify/functions"

# Never cache index.html — always serve fresh
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Never cache sw.js — browser must always check for updates
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Never cache JS/CSS bundles — force fresh on each version
[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Cache static assets aggressively (fonts, icons, manifest)
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Security headers — applied to all responses ──────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Force HTTPS for 1 year (includeSubDomains for Netlify subdomains)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Framing: allowed only from EQ Shell (core.eq.solutions + its Netlify URL).
    # X-Frame-Options is legacy — CSP frame-ancestors below supersedes it in
    # all modern browsers. Omitting here rather than setting ALLOW-FROM (which
    # is deprecated and ignored by Chrome/Firefox).
    # X-Frame-Options intentionally removed — see frame-ancestors in CSP.
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Limit referrer info sent to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions policy — disable features this app doesn't use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=()"
    # Content Security Policy
    # - default-src: only this origin by default
    # - script-src: self + PostHog (EU) + Clarity
    # - style-src: self + Google Fonts CDN
    # - font-src: Google Fonts CDN
    # - connect-src: self + Supabase + Anthropic + PostHog (events, replay)
    #                + Clarity (recording) + Bing (Clarity telemetry relay)
    # - img-src: self + data: + R2 (org logos) + PostHog/Clarity assets
    # - worker-src: self + blob: (PostHog session-replay worker)
    # - frame-ancestors: none (consistent with X-Frame-Options)
    # NOTE: CSP wildcards match ONE subdomain level, so both `*.posthog.com`
    # AND `*.i.posthog.com` are needed to cover `eu-assets.i.posthog.com`.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.posthog.com https://*.i.posthog.com https://www.clarity.ms https://*.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.anthropic.com https://*.posthog.com https://*.i.posthog.com https://*.clarity.ms https://c.bing.com; img-src 'self' data: https://pub-97a4f025d993484e91b8f15a8c73084d.r2.dev https://*.posthog.com https://*.i.posthog.com https://*.clarity.ms; worker-src 'self' blob:; frame-ancestors https://core.eq.solutions https://main--eq-shell.netlify.app;"
